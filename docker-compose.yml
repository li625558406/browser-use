# D:/AI/ai-scout/browser-use/docker-compose.yml

version: '3.8'

services:
  backend:
    build: .
    container_name: browser-use-webui
    ports:
      - "8000:8000"
    volumes:
      # Mount data directory for persistence
      - ./data:/app/data
      # Mount logs directory
      - ./logs:/app/logs
      # Mount Chrome profile from host (optional)
      # - ${HOME}/.config/google-chrome:/chrome-profile:ro
    environment:
      - DATABASE_URL=sqlite:///data/database.db
      - LOG_LEVEL=INFO
      - LOG_DIR=/app/logs
    restart: unless-stopped
    # Chrome needs access to host's display (not needed in headless mode)
    # For Windows Docker Desktop, Chrome on host is accessible via host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
